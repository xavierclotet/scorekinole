<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />

		<!-- Prevent theme flash on page load -->
		<script>
			(function() {
				var theme = null;
				// Safari with "Block All Cookies" throws on ANY localStorage access
				try {
					theme = localStorage.getItem('theme') || localStorage.getItem('adminTheme'); // adminTheme: backwards compat
				} catch (e) { /* storage unavailable — fall through to system preference */ }
				if (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
					theme = 'dark';
				}
				if (theme) {
					document.documentElement.setAttribute('data-theme', theme);
				}
			})();
		</script>

		<!-- Google Fonts: preconnect + non-blocking stylesheet (swapped to media="all" on load).
		     Moved out of app.css — an @import there blocked first paint behind 3 serial requests. -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Lexend:wght@400;600&display=swap"
			media="print"
			onload="this.media='all'"
		/>
		<noscript>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Lexend:wght@400;600&display=swap" />
		</noscript>

		<!-- Preconnect to external resources for better performance -->
		<link rel="preconnect" href="https://firestore.googleapis.com" />
		<link rel="preconnect" href="https://firebasestorage.googleapis.com" />
		<link rel="preconnect" href="https://www.googleapis.com" />
		<link rel="preconnect" href="https://lh3.googleusercontent.com" />
		<link rel="dns-prefetch" href="https://firestore.googleapis.com" />
		<link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
		<link rel="dns-prefetch" href="https://www.googleapis.com" />
		<link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/png" href="/icon-192.png" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Theme color for mobile browsers -->
		<meta name="theme-color" content="#667eea" />
		<meta name="msapplication-TileColor" content="#667eea" />

		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html, body {
				width: 100%;
				height: 100%;
				/* Global scroll/zoom restrictions removed for landing page usability */
			}
		</style>
		%sveltekit.head%
	</head>
	<!-- preload-code="viewport": download a route's JS chunk as soon as a link to
	     it is visible (hover never fires on touch devices, so "hover" alone left
	     mobile navigations cold) -->
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
